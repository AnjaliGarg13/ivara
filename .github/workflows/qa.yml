name: QA — E2E, Accessibility & Performance

on:
  pull_request:
    branches: [main]

jobs:
  e2e-and-a11y:
    name: Playwright E2E + Accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com

      - name: Run Playwright E2E tests
        run: npx playwright test tests/e2e tests/a11y tests/visual
        env:
          CI: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
            tests/visual/snapshots/
          retention-days: 30

  lighthouse:
    name: Lighthouse CI Performance
    runs-on: ubuntu-latest
    needs: e2e-and-a11y
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install LHCI
        run: npm install -g @lhci/cli

      - name: Build Next.js
        run: npm run build

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Lighthouse CI
        run: lhci autorun --config=tests/performance/lighthouse.config.js

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.sha }}
          path: .lighthouseci/
          retention-days: 30
